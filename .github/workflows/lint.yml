name: RuboCop Linter
on:
  pull_request:
  push:
    branches:
      - main
jobs:
  rubocop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.2'
          bundler-cache: true
      - name: Run RuboCop
        run: |
          bundle exec rubocop
      - name: Run RSpec
        run: |
          bundle exec rspec
      - name: Syntax check Fastfile*
        run: |
          find fastlane -name 'Fastfile*' -print0 | xargs -0 -n1 ruby -c
      - name: Bundler audit
        run: |
          gem install bundler-audit
          bundle audit check --update
